# 穿越圆圈飞行参数
takeoff_height: 1.0        # 起飞高度(m)
safe_return_height: 2.0    # 返回时安全飞行高度(m)，应高于所有圆圈
reach_threshold: 0.3       # 航点到达判定阈值(m)
approach_distance: 1.5     # 圆圈前后过渡点距离(m)

# 圆圈航点列表（相对起飞点偏移）
# x: 前方距离, y: 侧向距离, z: 圆心高度（相对地面）
circles:
  - {x: 3.0,  y: 0.0, z: 0.5}
  - {x: 6.0,  y: 0.0, z: 1.5}
  - {x: 9.0,  y: 0.0, z: 1.2}

# 终点（最后一个圆圈之后的目标点）
goal_x: 12.0
goal_y: 0.0
